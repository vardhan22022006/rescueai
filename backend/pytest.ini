[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
markers =
    integration: Integration tests that test multiple components together
    unit: Unit tests for individual functions
    api: API endpoint tests
filterwarnings =
    ignore::DeprecationWarning
